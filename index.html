<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>不同行为画像 · 15 题版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-grid"></div>
  <main class="app">
    <section id="intro" class="screen active">
      <div class="hero">
        <p class="kicker">15 题 · 6 维度画像测试</p>
        <h1>行为画像测试</h1>
        <p class="lead">回答 15 道问题，系统将记录你的答题数据并生成综合画像。支持多次答题取平均值。</p>
        <div class="intro-meta">
          <span>共 15 题</span>
          <span>6 维度评分</span>
          <span>多次答题取平均值</span>
        </div>
        <div class="hero-actions">
          <button id="startBtn" class="btn btn-primary">开始测试</button>
        </div>
      </div>
    </section>

    <section id="quiz" class="screen">
      <div class="topbar">
        <span class="kicker">逐题切换</span>
        <div class="progress">
          <div class="progress-count">
            <span id="progressCurrent">1</span>
            <span class="sep">/</span>
            <span id="progressTotal">15</span>
          </div>
          <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="15" aria-valuenow="0">
            <span id="progressFill" class="progress-fill"></span>
          </div>
          <div class="progress-remaining">剩余 <span id="progressRemaining">14</span> 题</div>
        </div>
      </div>

      <div class="question-card">
        <div class="question-title" id="questionTitle">第 1 题 · 幼儿园</div>
        <h2 id="questionPrompt">问题内容</h2>
        <div id="optionsList" class="options"></div>
      </div>

      <div class="nav">
        <button id="prevBtn" class="btn btn-ghost">上一题</button>
        <button id="nextBtn" class="btn btn-primary" disabled>下一题</button>
      </div>
    </section>

    <section id="result" class="screen">
      <div class="result-hero">
        <p class="kicker">最终画像</p>
        <h2 id="resultLabel">结果标题</h2>
        <p id="resultDescription" class="result-desc">结果描述</p>
        <p id="resultCardEcho" class="result-card is-hidden"></p>
      </div>

      <div class="result-grid">
        <div class="comment-box">
          <h3>综合评语</h3>
          <div class="radar-wrap">
            <canvas id="radarChart" width="240" height="240"></canvas>
          </div>
          <p id="resultComment"></p>
        </div>

        <div class="score-box">
          <h3>属性总计</h3>
          <div id="scoreList" class="score-list"></div>
        </div>
      </div>

      <!-- draw-cards-section moved to profile page -->

      <div class="share-box">
        <label for="shareText">分享文案</label>
        <textarea id="shareText" rows="3" readonly></textarea>
        <div class="share-actions">
          <button id="copyBtn" class="btn btn-ghost">复制文案</button>
          <button id="downloadBtn" class="btn btn-primary">保存图片</button>
        </div>
      </div>

      <div class="result-actions">
        <button id="finishBtn" class="btn btn-primary">完成</button>
        <button id="openCardsResultBtn" class="btn btn-ghost">查看卡牌墙</button>
      </div>
    </section>

    <section id="cards" class="screen">
      <div class="result-hero">
        <p class="kicker">卡牌墙</p>
        <h2>已收集 <span id="cardCount">0</span> / <span id="cardTotal">60</span></h2>
        <p class="result-desc">点击卡牌查看详情，抽取的卡牌会显示图片</p>
      </div>

      <div id="cardGrid" class="card-grid"></div>

      <div class="nav">
        <button id="cardsBackBtn" class="btn btn-primary">返回</button>
      </div>
    </section>

    <section id="profile" class="screen">
      <div class="result-hero">
        <p class="kicker">我的画像 · 实时</p>
        <h2 id="profileLabel">结果标题</h2>
        <p id="profileDescription" class="result-desc">结果描述</p>
        <p id="profileProgressHint" class="result-desc" style="margin-top:8px;color:var(--muted);font-size:14px;"></p>
      </div>

      <div class="result-grid">
        <div class="comment-box">
          <h3>综合评语</h3>
          <div class="radar-wrap">
            <canvas id="profileRadar" width="240" height="240"></canvas>
          </div>
          <div id="profileComment" class="profile-comment"></div>
        </div>

        <div class="score-box">
          <h3>属性统计</h3>
          <div id="profileScoreList" class="score-list"></div>
        </div>
      </div>

      <div class="draw-cards-section">
        <h3>抽取卡牌</h3>
        <p class="draw-desc">点击卡牌翻开查看（基于多次答题的收集）</p>
        <div id="drawCardsGrid" class="draw-cards-grid">
          <div class="draw-card-slot" data-slot="0"><span class="draw-card-question">?</span></div>
          <div class="draw-card-slot" data-slot="1"><span class="draw-card-question">?</span></div>
          <div class="draw-card-slot" data-slot="2"><span class="draw-card-question">?</span></div>
        </div>
        <button id="redrawCardsBtn" class="btn btn-ghost">重新抽取</button>
      </div>

      <div class="nav">
        <button id="openCardsProfileBtn" class="btn btn-ghost">查看卡牌墙</button>
      </div>
    </section>

    <div id="cardModal" class="card-modal">
      <div class="card-modal-content">
        <button id="cardModalClose" class="card-modal-close" aria-label="关闭">×</button>
        <img id="cardModalImage" class="card-modal-image" src="" alt="">
        <h3 id="cardModalTitle" class="card-modal-title"></h3>
        <div class="card-modal-actions">
          <button id="cardModalCancel" class="btn btn-ghost">关闭</button>
        </div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav" id="bottomNav">
    <button class="bottom-nav-item active" data-nav="home" id="navHome">测试页面</button>
    <button class="bottom-nav-item" data-nav="profile" id="navProfile">我的</button>
  </nav>

  <div id="toast" class="toast" aria-live="polite"></div>
  <script src="./app.js" defer></script>
</body>
</html>
